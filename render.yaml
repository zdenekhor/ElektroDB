services:
  - type: web
    name: elektrodb
    env: docker
    autoDeploy: true
    healthCheckPath: /health
    disks:
      - name: elektrodb-data
        mountPath: /app/data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASIC_AUTH_USER
        sync: false
      - key: BASIC_AUTH_PASS
        sync: false
