# Nginx konfigurace pro ElektroDB
# Umístění: /etc/nginx/sites-available/default
# nebo: /etc/nginx/conf.d/elektro-db.conf

upstream elektro_db {
  server localhost:3000;
}

# Redirect HTTP → HTTPS
server {
  listen 80;
  server_name _;
  return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
  listen 443 ssl http2;
  server_name _;

  # SSL certifikáty (Let's Encrypt)
  ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

  # SSL optimalizace
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # Gzip komprese
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml;

  # Client body size
  client_max_body_size 10M;

  # Proxy nastavení
  location / {
    proxy_pass http://elektro_db;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Timeout
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # API routes (minimálníí caching)
  location ~ ^/api/ {
    proxy_pass http://elektro_db;
    proxy_cache_bypass 1;
    add_header Cache-Control "public, max-age=0";
  }

  # Static assets (více caching)
  location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://elektro_db;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Health check endpoint
  location /health {
    proxy_pass http://elektro_db;
    access_log off;
  }

  # Rate limiting (pro brute-force ochranu)
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=search_limit:10m rate=5r/s;

  location ~ ^/api/ {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://elektro_db;
  }

  location ~ ^/search {
    limit_req zone=search_limit burst=10 nodelay;
    proxy_pass http://elektro_db;
  }

  # Error pages
  error_page 404 /404.html;
  error_page 500 502 503 504 /50x.html;
  
  location = /50x.html {
    root /usr/share/nginx/html;
  }

  # Deny access k citlivým souborům
  location ~ /\. {
    deny all;
  }

  location ~ ~$ {
    deny all;
  }

  # Logging
  access_log /var/log/nginx/elektro-db_access.log combined;
  error_log /var/log/nginx/elektro-db_error.log warn;
}

